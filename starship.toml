command_timeout = 5000

# в”Җв”Җ LГӯnea 1: usuario, host, hora, dir, git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
format = """
[в•ӯв”Җ](bold blue)[$username](bold yellow)\
[$hostname](bold green)\
[оӮ°](blue)\
[$time](bold bright-black)\
[оӮ°](blue)\
[$directory]($style)\
[$git_branch]($style)$git_status\
$all
[в•°в”Җ](bold blue)[$character](bold green)"""

# в”Җв”Җ Usuario & host в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[username]
show_always = true
style_user = "bold yellow"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold green"
format = "[@$hostname]($style) "

# в”Җв”Җ Tiempo в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[time]
disabled = false
format = " [рҹ•җ $time]($style) "
style = "bold bright-black"
time_format = "%H:%M"

# в”Җв”Җ Directorio в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
truncation_length = 4
truncation_symbol = "вҖҰ/"
style = "bold cyan"
fish_style_pwd_dir_length = 2
format = " [$path]($style)"
home_symbol = "~"
use_os_path_sep = true

# в”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = " оңҘ"
style = "bold purple"
format = " on [$symbol$branch](bold purple)"

[git_status]
disabled = false
style = "bold bright-black"
format = '[\($all_status$ahead_behind\)]($style) '
conflicted = "рҹҸі"
up_to_date = ""
untracked = "вҖҰ"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
stashed = "рҹ“Ұ"
modified = "!"
staged = "+"

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '(+$added_added_style)$deleted'

# в”Җв”Җ Lenguajes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[nodejs]
symbol = "оңҳ "
format = "via [$symbol$version](bold green) "

[rust]
symbol = "оһЁ "
format = "via [$symbol$version](bold red) "

[python]
symbol = "оңј "
format = "via [$symbol$version](bold yellow) "

[golang]
symbol = "оҳ§ "
format = "via [$symbol$version](bold cyan) "

[package]
symbol = "рҹ“Ұ "
format = "via [$symbol$version](bold blue) "

# в”Җв”Җ Shell indicator в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[shell]
disabled = false
format = "$indicator"

# в”Җв”Җ Prompt char в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"
vicmd_symbol = "[вқ®](bold yellow)"
