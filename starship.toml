# starship - https://starship.rs/config/
command_timeout = 5000

format = """
[в•ӯв”Җ](bold blue)$all
[в•°в”Җ](bold blue)$character"""

# Activar cuando tengas Docker instalado:
# [docker_context]
# disabled = false
# symbol = "рҹҗӢ "
# style = "bold blue"
# only_with_files = true

[nodejs]
symbol = "оңҳ "
format = "via [$symbol$version](bold green) "

[rust]
symbol = "оһЁ "
format = "via [$symbol$version](bold red) "

[python]
symbol = "оңј "
format = "via [$symbol$version](bold yellow) "

[git_branch]
symbol = "оңҘ "
format = "on [$symbol$branch](bold purple) "

[git_status]
disabled = true

[package]
symbol = "рҹ“Ұ "
format = "via [$symbol$version](bold blue) "

[shell]
disabled = false
format = "$indicator"

[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"
