# starship - https://starship.rs/config/
format = """
[╭─](bold blue)$all
[╰─](bold blue)$character"""

[nodejs]
symbol = " "
format = "via [$symbol$version](bold green) "

[rust]
symbol = " "
format = "via [$symbol$version](bold red) "

[python]
symbol = " "
format = "via [$symbol$version](bold yellow) "

[git_branch]
symbol = " "
format = "on [$symbol$branch](bold purple) "

[git_status]
format = "[$all_status$ahead_behind](bold yellow) "

[package]
symbol = "📦 "
format = "via [$symbol$version](bold blue) "

[shell]
disabled = false
format = "$indicator"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
